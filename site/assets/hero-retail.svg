<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Hero retail clean">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F5F8FF"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0A66FF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#0A66FF" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <circle cx="1240" cy="240" r="220" fill="url(#blue)" filter="url(#soft)"/>
  <circle cx="1380" cy="700" r="200" fill="url(#blue)" filter="url(#soft)"/>
  <circle cx="260" cy="700" r="240" fill="url(#blue)" filter="url(#soft)"/>

  <rect x="980" y="220" width="440" height="440" rx="64" fill="#0A66FF" fill-opacity="0.10"/>
  <rect x="1040" y="270" width="320" height="320" rx="56" fill="#0A66FF" fill-opacity="0.14"/>

  <circle cx="1320" cy="260" r="54" fill="#FFD24A" fill-opacity="0.96"/>
  <rect x="1080" y="340" width="240" height="42" rx="21" fill="#FFFFFF" fill-opacity="0.88"/>
  <rect x="1080" y="404" width="280" height="42" rx="21" fill="#FFFFFF" fill-opacity="0.76"/>
  <rect x="1080" y="468" width="210" height="42" rx="21" fill="#FFFFFF" fill-opacity="0.70"/>
</svg>

