<!DOCTYPE html>
<html lang="pt-BR" data-page="landing">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
    <meta name="description" content="" />
    <meta property="og:title" content="" />
    <meta property="og:description" content="" />
    <meta property="og:image" content="" />
    <meta property="og:url" content="" />
    <meta name="twitter:title" content="" />
    <meta name="twitter:description" content="" />
    <meta name="twitter:image" content="" />
    <link rel="canonical" href="" />
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <script src="/js/site.config.js"></script>
    <script src="/js/head.js"></script>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <div class="page-ambient" aria-hidden="true">
      <div class="page-ambient__orb page-ambient__orb--one"></div>
      <div class="page-ambient__orb page-ambient__orb--two"></div>
      <div class="page-ambient__grid"></div>
    </div>

    <header class="site-header" data-header></header>

    <main class="page-main">
      <section class="hero hero--immersive hero--landing">
        <div class="hero__backdrop" aria-hidden="true">
          <img
            data-src="assets.heroSecondary"
            data-alt="landing.hero.imageAlt"
            alt=""
            loading="eager"
            decoding="async"
            fetchpriority="high"
            width="1600"
            height="900"
          />
          <div class="hero__veil"></div>
        </div>

        <div class="hero__content section-shell">
          <div class="hero__copy">
            <span class="eyebrow" data-text="landing.hero.eyebrow"></span>
            <h1 class="hero__title" data-animate>
              <span data-text="landing.hero.title"></span>
              <em data-text="landing.hero.highlight"></em>
            </h1>
            <p class="hero__description" data-text="landing.hero.description" data-animate></p>
            <div class="hero__actions" data-animate>
              <a class="button button-primary" data-cta="landing.hero.primaryCta" href="#"></a>
              <a class="button button-secondary" data-cta="landing.hero.secondaryCta" href="#"></a>
            </div>
          </div>

          <div class="hero__signals hero__signals--compact" data-animate>
            <div class="hero__signals-grid" data-render="landing.hero.signals"></div>
          </div>
        </div>
      </section>

      <section class="section-shell section-block" data-section-page="landing" data-section="proof">
        <div class="section-heading">
          <span class="eyebrow" data-text="landing.proof.eyebrow"></span>
          <h2 data-text="landing.proof.title"></h2>
          <p data-text="landing.proof.description"></p>
        </div>
        <div class="metric-grid metric-grid--landing" data-render="landing.proof.items"></div>
      </section>

      <section class="section-shell section-block" data-section-page="landing" data-section="offer">
        <div class="section-heading">
          <span class="eyebrow" data-text="landing.offer.eyebrow"></span>
          <h2 data-text="landing.offer.title"></h2>
          <p data-text="landing.offer.description"></p>
        </div>
        <div class="offer-grid" data-render="landing.offer.items"></div>
      </section>

      <section class="section-shell section-block" data-section-page="landing" data-section="outcomes">
        <div class="section-heading">
          <span class="eyebrow" data-text="landing.outcomes.eyebrow"></span>
          <h2 data-text="landing.outcomes.title"></h2>
          <p data-text="landing.outcomes.description"></p>
        </div>
        <div class="outcome-grid" data-render="landing.outcomes.items"></div>
      </section>

      <section class="section-shell section-block" data-section-page="landing" data-section="faq">
        <div class="section-heading">
          <span class="eyebrow" data-text="landing.faq.eyebrow"></span>
          <h2 data-text="landing.faq.title"></h2>
          <p data-text="landing.faq.description"></p>
        </div>
        <div class="faq-list" data-render="landing.faq.items"></div>
      </section>

      <section class="section-shell section-cta panel" data-animate>
        <div>
          <span class="eyebrow" data-text="landing.cta.eyebrow"></span>
          <h2 data-text="landing.cta.title"></h2>
          <p data-text="landing.cta.description"></p>
        </div>
        <div class="section-cta__actions">
          <a class="button button-primary" data-cta="landing.cta.primaryCta" href="#"></a>
          <a class="button button-secondary" data-cta="landing.cta.secondaryCta" href="#"></a>
        </div>
      </section>

      <section class="section-shell section-block contact-layout contact-layout--single" data-section-page="landing" data-section="contact">
        <div class="section-heading section-heading--left">
          <span class="eyebrow" data-text="landing.contact.eyebrow"></span>
          <h2 data-text="landing.contact.title"></h2>
          <p data-text="landing.contact.description"></p>
        </div>

        <form class="contact-form panel" data-contact-form data-animate>
          <div class="contact-form__grid">
            <label class="field">
              <span data-text="contact.form.fields.name.label"></span>
              <input
                type="text"
                name="name"
                data-placeholder="contact.form.fields.name.placeholder"
                placeholder=""
                required
              />
            </label>

            <label class="field">
              <span data-text="contact.form.fields.email.label"></span>
              <input
                type="email"
                name="email"
                data-placeholder="contact.form.fields.email.placeholder"
                placeholder=""
                required
              />
            </label>

            <label class="field field--full">
              <span data-text="contact.form.fields.company.label"></span>
              <input
                type="text"
                name="company"
                data-placeholder="contact.form.fields.company.placeholder"
                placeholder=""
              />
            </label>

            <label class="field field--full">
              <span data-text="contact.form.fields.message.label"></span>
              <textarea
                name="message"
                rows="5"
                data-placeholder="contact.form.fields.message.placeholder"
                placeholder=""
                required
              ></textarea>
            </label>

            <label class="field field--full field--consent">
              <span class="field__consent">
                <input type="checkbox" name="consent" required />
                <span data-text="contact.form.fields.consent.label"></span>
              </span>
            </label>
          </div>

          <div class="contact-form__footer">
            <button class="button button-primary" type="submit" data-text="contact.form.submitLabel"></button>
            <p class="contact-form__status" data-form-status></p>
          </div>
        </form>
      </section>
    </main>

    <footer class="site-footer section-shell" data-footer></footer>
    <script src="/js/template.js" defer></script>
  </body>
</html>
