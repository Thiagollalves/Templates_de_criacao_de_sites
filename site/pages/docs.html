<!DOCTYPE html>
<html lang="pt-BR" data-page="docs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
    <meta name="description" content="" />
    <meta property="og:title" content="" />
    <meta property="og:description" content="" />
    <meta property="og:image" content="" />
    <meta property="og:url" content="" />
    <meta name="twitter:title" content="" />
    <meta name="twitter:description" content="" />
    <meta name="twitter:image" content="" />
    <link rel="canonical" href="" />
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <script src="/js/site.config.js"></script>
    <script src="/js/head.js"></script>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <div class="page-ambient" aria-hidden="true">
      <div class="page-ambient__orb page-ambient__orb--one"></div>
      <div class="page-ambient__orb page-ambient__orb--two"></div>
      <div class="page-ambient__grid"></div>
    </div>

    <header class="site-header" data-header></header>

    <main class="page-main">
      <section class="page-hero section-shell">
        <span class="eyebrow" data-text="docs.hero.eyebrow"></span>
        <h1 data-text="docs.hero.title" data-animate></h1>
        <p class="page-hero__description" data-text="docs.hero.description" data-animate></p>
        <div class="hero__actions" data-animate>
          <a class="button button-primary" data-cta="docs.hero.primaryCta" href="#"></a>
          <a class="button button-secondary" data-cta="docs.hero.secondaryCta" href="#"></a>
        </div>
      </section>

      <section class="section-shell section-block docs-layout" data-docs-root>
        <aside class="doc-nav" aria-label="Navegacao de documentos" data-docs-nav></aside>
        <div class="doc-content" data-docs-content></div>
        <div class="panel doc-empty" data-docs-empty hidden>
          <p>
            Nenhum documento configurado. Verifique <code>site/js/site.config.js</code> em
            <code>docs.documents</code>.
          </p>
        </div>
      </section>
    </main>

    <footer class="site-footer section-shell" data-footer></footer>
    <script src="/js/template.js" defer></script>
    <script src="/js/docs.js" defer></script>
  </body>
</html>
