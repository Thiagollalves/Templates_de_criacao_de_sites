<!DOCTYPE html>
<html lang="pt-BR" data-page="company">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
    <meta name="description" content="" />
    <meta property="og:title" content="" />
    <meta property="og:description" content="" />
    <meta property="og:image" content="" />
    <meta property="og:url" content="" />
    <meta name="twitter:title" content="" />
    <meta name="twitter:description" content="" />
    <meta name="twitter:image" content="" />
    <link rel="canonical" href="" />
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <script src="/js/site.config.js"></script>
    <script src="/js/head.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,800&family=Manrope:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <div class="page-ambient" aria-hidden="true">
      <div class="page-ambient__orb page-ambient__orb--one"></div>
      <div class="page-ambient__orb page-ambient__orb--two"></div>
      <div class="page-ambient__grid"></div>
    </div>

    <header class="site-header" data-header></header>

    <main class="page-main">
      <section class="page-hero page-hero--detail section-shell">
        <div class="page-hero__content">
          <span class="eyebrow" data-text="pages.company.hero.eyebrow"></span>
          <h1 data-text="pages.company.hero.title" data-animate></h1>
          <p class="page-hero__description" data-text="pages.company.hero.description" data-animate></p>
          <div class="hero__actions" data-animate>
            <a class="button button-primary" data-cta="pages.company.hero.primaryCta" href="#"></a>
            <a class="button button-secondary" data-cta="pages.company.hero.secondaryCta" href="#"></a>
          </div>
          <div class="page-hero__rail" data-animate>
            <span>branding</span>
            <span>narrativa</span>
            <span>cta</span>
            <span>publicacao</span>
          </div>
        </div>
      </section>

      <section class="section-shell section-block section-block--split">
        <div class="section-heading section-heading--left">
          <span class="eyebrow" data-text="pages.company.intro.eyebrow"></span>
          <h2 data-text="pages.company.intro.title"></h2>
          <p data-text="pages.company.intro.description"></p>
        </div>
        <div class="stack-grid" data-render="pages.company.highlights"></div>
      </section>

      <section class="section-shell section-block">
        <div class="section-heading">
          <span class="eyebrow" data-text="pages.company.valuesIntro.eyebrow"></span>
          <h2 data-text="pages.company.valuesIntro.title"></h2>
          <p data-text="pages.company.valuesIntro.description"></p>
        </div>
        <div class="insight-grid" data-render="pages.company.values"></div>
      </section>

      <section class="section-shell section-block section-block--split">
        <div class="section-heading section-heading--sticky">
          <span class="eyebrow" data-text="pages.company.timelineIntro.eyebrow"></span>
          <h2 data-text="pages.company.timelineIntro.title"></h2>
          <p data-text="pages.company.timelineIntro.description"></p>
        </div>
        <div class="timeline-list" data-render="pages.company.timeline"></div>
      </section>

      <section class="section-shell section-cta" data-animate>
        <div>
          <span class="eyebrow" data-text="pages.company.closing.eyebrow"></span>
          <h2 data-text="pages.company.closing.title"></h2>
          <p data-text="pages.company.closing.description"></p>
        </div>
        <div class="section-cta__actions">
          <a class="button button-primary" data-cta="pages.company.closing.primaryCta" href="#"></a>
          <a class="button button-secondary" data-cta="pages.company.closing.secondaryCta" href="#"></a>
        </div>
      </section>
    </main>

    <footer class="site-footer section-shell" data-footer></footer>
    <script src="/js/template.js" defer></script>
  </body>
</html>
