<!DOCTYPE html>
<html lang="pt-BR" data-page="security">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
    <meta name="description" content="" />
    <meta property="og:title" content="" />
    <meta property="og:description" content="" />
    <meta property="og:image" content="" />
    <meta property="og:url" content="" />
    <meta name="twitter:title" content="" />
    <meta name="twitter:description" content="" />
    <meta name="twitter:image" content="" />
    <link rel="canonical" href="" />
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <script src="/js/site.config.js"></script>
    <script src="/js/head.js"></script>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <div class="page-ambient" aria-hidden="true">
      <div class="page-ambient__orb page-ambient__orb--one"></div>
      <div class="page-ambient__orb page-ambient__orb--two"></div>
      <div class="page-ambient__grid"></div>
    </div>

    <header class="site-header" data-header></header>

    <main class="page-main">
      <section class="page-hero section-shell">
        <span class="eyebrow" data-text="pages.security.hero.eyebrow"></span>
        <h1 data-text="pages.security.hero.title" data-animate></h1>
        <p class="page-hero__description" data-text="pages.security.hero.description" data-animate></p>
        <div class="hero__actions" data-animate>
          <a class="button button-primary" data-cta="pages.security.hero.primaryCta" href="#"></a>
          <a class="button button-secondary" data-cta="pages.security.hero.secondaryCta" href="#"></a>
        </div>
      </section>

      <section class="section-shell section-block section-block--split" id="checklist">
        <div class="section-heading section-heading--left">
          <span class="eyebrow" data-text="pages.security.intro.eyebrow"></span>
          <h2 data-text="pages.security.intro.title"></h2>
          <p data-text="pages.security.intro.description"></p>
        </div>
        <div class="stack-grid" data-render="pages.security.highlights"></div>
      </section>

      <section class="section-shell section-cta panel" data-animate>
        <div>
          <span class="eyebrow" data-text="pages.security.closing.eyebrow"></span>
          <h2 data-text="pages.security.closing.title"></h2>
          <p data-text="pages.security.closing.description"></p>
        </div>
        <div class="section-cta__actions">
          <a class="button button-primary" data-cta="pages.security.closing.primaryCta" href="#"></a>
          <a class="button button-secondary" data-cta="pages.security.closing.secondaryCta" href="#"></a>
        </div>
      </section>
    </main>

    <footer class="site-footer section-shell" data-footer></footer>
    <script src="/js/template.js" defer></script>
  </body>
</html>
