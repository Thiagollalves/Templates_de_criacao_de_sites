<!DOCTYPE html>
<html lang="pt-BR" data-page="login">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
    <meta name="description" content="" />
    <meta property="og:title" content="" />
    <meta property="og:description" content="" />
    <meta property="og:image" content="" />
    <meta property="og:url" content="" />
    <meta name="twitter:title" content="" />
    <meta name="twitter:description" content="" />
    <meta name="twitter:image" content="" />
    <link rel="canonical" href="" />
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <script src="/js/site.config.js"></script>
    <script src="/js/head.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,800&family=Manrope:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body class="auth-page">
    <div class="page-ambient" aria-hidden="true">
      <div class="page-ambient__orb page-ambient__orb--one"></div>
      <div class="page-ambient__orb page-ambient__orb--two"></div>
      <div class="page-ambient__grid"></div>
    </div>

    <main class="auth-shell">
      <section class="auth-panel">
        <div class="auth-story">
          <a class="auth-brand" href="/">
            <img class="auth-brand__mark" src="/assets/logo-mark.svg" alt="Atlas Frame" />
            <div>
              <span class="auth-brand__eyebrow">Atlas Frame</span>
              <strong class="auth-brand__name">Portal do cliente</strong>
            </div>
          </a>

          <span class="eyebrow" data-login-eyebrow></span>
          <h1 class="auth-story__title" data-login-title></h1>
          <p class="auth-story__description" data-login-description></p>

          <ul class="auth-benefit-list" data-login-benefits></ul>

          <div class="auth-visual" aria-hidden="true">
            <img src="/assets/workspace-console.svg" alt="" />
          </div>
        </div>

        <div class="auth-access">
          <div class="auth-access__header">
            <span class="eyebrow">Acesso</span>
            <h2>Entrar na area autenticada</h2>
            <p>Use email e senha para abrir o workspace do template.</p>
          </div>

          <form class="auth-form" data-login-form>
            <label class="auth-field">
              <span>Email</span>
              <input
                type="email"
                name="email"
                autocomplete="username"
                placeholder="voce@empresa.com"
                required
              />
            </label>

            <label class="auth-field">
              <span>Senha</span>
              <input
                type="password"
                name="password"
                autocomplete="current-password"
                placeholder="Sua senha"
                required
              />
            </label>

            <button class="button button-primary" type="submit">Entrar no workspace</button>
            <p class="auth-status" data-auth-status></p>
          </form>

          <section class="auth-demo">
            <div class="auth-demo__header">
              <span class="eyebrow" data-demo-title></span>
              <p data-demo-description></p>
            </div>

            <div class="auth-demo__grid">
              <div class="auth-demo__item">
                <span>Email</span>
                <strong data-demo-email></strong>
              </div>
              <div class="auth-demo__item">
                <span>Senha</span>
                <strong data-demo-password></strong>
              </div>
            </div>
          </section>

          <div class="auth-access__actions">
            <a class="button button-ghost button-small" href="/">Ver site publico</a>
            <a class="button button-secondary button-small" href="/pages/company.html">Entender o produto</a>
          </div>
        </div>
      </section>
    </main>

    <script src="/js/app.js" defer></script>
  </body>
</html>
